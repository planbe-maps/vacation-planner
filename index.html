<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vacation Planner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s;
        }

        body.theme-unicorn {
            background: linear-gradient(135deg, #e8d5f0 0%, #f3e5f5 100%);
            --primary: #9b59b6;
            --primary-light: #e1bee7;
            --primary-dark: #7b1fa2;
            --primary-gradient: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
        }

        body.theme-flower {
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 100%);
            --primary: #e91e8c;
            --primary-light: #f8bbd9;
            --primary-dark: #c2185b;
            --primary-gradient: linear-gradient(135deg, #ff69b4 0%, #e91e8c 100%);
        }

        body.theme-ocean {
            background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
            --primary: #0097a7;
            --primary-light: #b2ebf2;
            --primary-dark: #006064;
            --primary-gradient: linear-gradient(135deg, #00bcd4 0%, #0097a7 100%);
        }

        body.theme-rainbow {
            background: linear-gradient(135deg, #ffe6e6 0%, #fff0e6 25%, #ffffcc 50%, #e6ffe6 75%, #e6f0ff 100%);
            --primary: #ff6b6b;
            --primary-light: #ffd1d1;
            --primary-dark: #ee5253;
            --primary-gradient: linear-gradient(135deg, #ff6b6b 0%, #feca57 25%, #48dbfb 75%, #ff9ff3 100%);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Login Page */
        .login-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .welcome-title {
            font-size: 2.2em;
            font-weight: bold;
            background: linear-gradient(135deg, #9b59b6 0%, #e91e8c 50%, #9b59b6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .welcome-subtitle {
            font-size: 1.2em;
            color: #888;
            margin-bottom: 40px;
        }

        .floating-emojis {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .float-emoji {
            position: absolute;
            font-size: 2em;
            left: var(--x);
            animation: floatUp 4s ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0.6;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }

        .name-input-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1;
            width: 100%;
            max-width: 300px;
        }

        .name-input {
            padding: 18px 25px;
            font-size: 1.3em;
            border: 3px solid #ddd;
            border-radius: 50px;
            text-align: center;
            outline: none;
            transition: all 0.3s;
        }

        .name-input:focus {
            border-color: #9b59b6;
            box-shadow: 0 0 0 4px rgba(155, 89, 182, 0.2);
        }

        .theme-label {
            font-size: 1em;
            color: #888;
            margin-top: 10px;
        }

        .theme-picker {
            display: flex;
            gap: 12px;
            margin: 10px 0 20px 0;
        }

        .theme-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 16px;
            border: 3px solid #ddd;
            border-radius: 15px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .theme-option:hover {
            border-color: #aaa;
            transform: scale(1.05);
        }

        .theme-option.selected {
            border-color: #9b59b6;
            background: #f3e5f5;
        }

        .theme-option[data-theme="flower"].selected {
            border-color: #e91e8c;
            background: #fce4ec;
        }

        .theme-option[data-theme="ocean"].selected {
            border-color: #0097a7;
            background: #e0f7fa;
        }

        .theme-option[data-theme="rainbow"].selected {
            border-color: #ff6b6b;
            background: linear-gradient(135deg, #ffe6e6 0%, #ffffcc 50%, #e6f0ff 100%);
        }

        .theme-avatar {
            font-size: 2em;
        }


        .start-btn {
            padding: 18px 45px;
            font-size: 1.3em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            background: linear-gradient(135deg, #9b59b6 0%, #e91e8c 100%);
            color: white;
        }

        .start-btn:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-top: 35px;
        }

        .header-name {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header-avatar {
            font-size: 2em;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .header-avatar:hover {
            transform: scale(1.1);
        }

        .avatar-picker {
            display: none;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
        }

        .avatar-picker.visible {
            display: flex;
        }

        .avatar-option {
            font-size: 1.8em;
            background: white;
            border: 3px solid #ddd;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .avatar-option:hover {
            transform: scale(1.1);
            border-color: var(--primary);
        }

        .header h1 {
            font-size: 1.8em;
            color: var(--primary-dark);
        }

        .header .subtitle {
            color: #888;
            font-size: 0.95em;
            margin-top: 5px;
        }

        .switch-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 6px 12px;
            background: white;
            border: 2px solid var(--primary);
            color: var(--primary);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75em;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .switch-btn:hover {
            background: var(--primary);
            color: white;
        }

        /* Week Selector */
        .week-selector {
            margin-bottom: 15px;
        }

        .week-selector select {
            width: 100%;
            padding: 14px 20px;
            font-size: 1.1em;
            border: 3px solid var(--primary-light);
            border-radius: 15px;
            background: white;
            color: #333;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239b59b6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 20px;
            transition: all 0.2s;
            font-weight: 600;
        }

        .week-selector select:hover {
            border-color: var(--primary);
        }

        .week-selector select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        /* Day Selector */
        .day-selector {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .day-tab {
            padding: 10px 8px;
            border: none;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85em;
            color: #666;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            min-width: 60px;
            text-align: center;
        }

        .day-tab:hover {
            background: var(--primary-light);
            color: var(--primary-dark);
        }

        .day-tab.active {
            background: var(--primary-gradient);
            color: white;
            transform: scale(1.05);
        }

        .day-tab.today {
            outline: 3px solid #4CAF50;
            outline-offset: 2px;
            position: relative;
        }

        .day-tab.today::before {
            content: 'TODAY';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: #4CAF50;
            color: white;
            font-size: 8px;
            padding: 2px 5px;
            border-radius: 4px;
            font-weight: bold;
        }

        .day-tab.outside-vacation {
            opacity: 0.4;
            pointer-events: none;
        }

        .day-tab .day-name {
            display: block;
        }

        .day-tab .day-date {
            display: block;
            font-size: 0.75em;
            opacity: 0.8;
            margin-top: 2px;
        }

        /* Main Card */
        .day-card {
            background: white;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            margin-bottom: 20px;
        }

        .day-title {
            text-align: center;
            font-size: 1.5em;
            color: var(--primary-dark);
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid var(--primary-light);
        }

        .day-title .date {
            display: block;
            font-size: 0.6em;
            color: #888;
            font-weight: normal;
            margin-top: 5px;
        }

        /* Section Headers */
        .section-header {
            font-size: 1.1em;
            color: var(--primary-dark);
            margin: 20px 0 15px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-header:first-child {
            margin-top: 0;
        }

        /* Daily Tasks */
        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: #f8f9fa;
            border-radius: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .task-item:hover {
            background: var(--primary-light);
            border-color: var(--primary);
        }

        .task-item.completed {
            background: var(--primary-light);
            border-color: var(--primary);
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            opacity: 0.7;
        }

        .task-checkbox {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .task-item.completed .task-checkbox {
            background: var(--primary);
            color: white;
        }

        .task-checkbox::after {
            content: '✓';
            font-size: 16px;
            font-weight: bold;
            opacity: 0;
        }

        .task-item.completed .task-checkbox::after {
            opacity: 1;
        }

        .task-emoji {
            font-size: 1.4em;
        }

        .task-content {
            flex: 1;
        }

        .task-text {
            font-weight: 600;
            color: #333;
        }

        .task-time {
            font-size: 0.85em;
            color: #888;
            margin-top: 2px;
        }

        .chore-select {
            width: 100%;
            padding: 8px 12px;
            margin-top: 8px;
            font-size: 0.85em;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            color: #333;
            cursor: pointer;
        }

        .chore-select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .chore-task {
            flex-wrap: wrap;
        }

        .chore-task .task-content {
            width: calc(100% - 80px);
        }

        /* Activity Picker Dropdown */
        .activity-picker {
            margin-top: 15px;
        }

        .activity-picker select {
            width: 100%;
            padding: 14px 20px;
            font-size: 1em;
            border: 2px solid var(--primary-light);
            border-radius: 15px;
            background: white;
            color: #333;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239b59b6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 20px;
            transition: all 0.2s;
        }

        .activity-picker select:hover {
            border-color: var(--primary);
        }

        .activity-picker select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .activity-picker select:disabled {
            background-color: #f5f5f5;
            color: #888;
            cursor: default;
        }


        /* Special activity styling */
        .special-activity {
            background: var(--primary-light);
            border-color: var(--primary);
        }

        .special-activity .remove-btn {
            margin-left: auto;
            background: rgba(0,0,0,0.1);
            border: none;
            color: #666;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1em;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .special-activity .remove-btn:hover {
            background: rgba(0,0,0,0.2);
            color: #333;
        }

        /* Hint */
        .hint {
            background: #fff9c4;
            color: #f57f17;
            padding: 12px 16px;
            border-radius: 12px;
            text-align: center;
            margin-top: 15px;
            font-weight: 500;
            display: none;
        }

        .hint.visible {
            display: block;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            color: #bbb;
            padding: 20px;
            font-style: italic;
        }

        /* Clear Button */
        .clear-btn {
            width: 100%;
            padding: 14px;
            background: #ffebee;
            color: #c62828;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: #ffcdd2;
        }

        /* Progress indicator */
        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-gradient);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .progress-text {
            text-align: center;
            color: #888;
            font-size: 0.85em;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Page -->
        <div class="login-page" id="login-page">
            <div class="welcome-title">🌴 School Break Planner 🌴</div>
            <div class="welcome-subtitle">What's your name?</div>
            <div class="floating-emojis">
                <span class="float-emoji" style="--delay: 0s; --x: 20%;">☀️</span>
                <span class="float-emoji" style="--delay: 1s; --x: 40%;">🎨</span>
                <span class="float-emoji" style="--delay: 2s; --x: 60%;">📚</span>
                <span class="float-emoji" style="--delay: 0.5s; --x: 80%;">🏊</span>
                <span class="float-emoji" style="--delay: 1.5s; --x: 30%;">🎲</span>
                <span class="float-emoji" style="--delay: 2.5s; --x: 70%;">🌳</span>
            </div>
            <div class="name-input-container">
                <input type="text" id="name-input" class="name-input" placeholder="Enter your name" maxlength="20">

                <div class="theme-label">Pick your avatar:</div>
                <div class="theme-picker" id="login-theme-picker">
                    <button class="theme-option selected" data-theme="unicorn" onclick="selectTheme('unicorn')">
                        <span class="theme-avatar">🦄</span>
                    </button>
                    <button class="theme-option" data-theme="flower" onclick="selectTheme('flower')">
                        <span class="theme-avatar">🌸</span>
                    </button>
                    <button class="theme-option" data-theme="ocean" onclick="selectTheme('ocean')">
                        <span class="theme-avatar">🐬</span>
                    </button>
                    <button class="theme-option" data-theme="rainbow" onclick="selectTheme('rainbow')">
                        <span class="theme-avatar">🌈</span>
                    </button>
                </div>

                <button class="start-btn" onclick="submitName()">Let's Go! 🚀</button>
            </div>
        </div>

        <!-- Main App -->
        <div id="main-app" style="display: none;">
            <button class="switch-btn" onclick="showLoginPage()">← Switch</button>
            <div class="header">
                <div class="header-name">
                    <span class="header-avatar" id="header-avatar" onclick="toggleAvatarPicker()">🦄</span>
                    <h1 id="header-title">My Planner</h1>
                </div>
                <div class="avatar-picker" id="avatar-picker">
                    <button class="avatar-option" data-theme="unicorn" onclick="changeAvatar('unicorn')">🦄</button>
                    <button class="avatar-option" data-theme="flower" onclick="changeAvatar('flower')">🌸</button>
                    <button class="avatar-option" data-theme="ocean" onclick="changeAvatar('ocean')">🐬</button>
                    <button class="avatar-option" data-theme="rainbow" onclick="changeAvatar('rainbow')">🌈</button>
                </div>
                <p class="subtitle">March 19 - April 19</p>
            </div>

            <!-- Week Selector -->
            <div class="week-selector">
                <select id="week-select" onchange="selectWeek(this.value)">
                    <!-- Generated by JS -->
                </select>
            </div>

            <!-- Day Selector Tabs -->
            <div class="day-selector" id="day-selector">
                <!-- Generated by JS -->
            </div>

            <!-- Day Card -->
            <div class="day-card">
                <div class="day-title" id="day-title">
                    Sunday
                    <span class="date" id="day-date">March 19</span>
                </div>

                <!-- Daily Tasks -->
                <div class="section-header">🌞 My Day</div>
                <div id="daily-tasks">
                    <!-- Generated by JS -->
                </div>

                <!-- Placed Weekly Activities -->
                <div class="section-header">✨ Special Activities</div>
                <div id="placed-activities">
                    <!-- Generated by JS -->
                </div>

                <!-- Available Activities to Add -->
                <div class="activity-picker">
                    <select id="activity-select" onchange="addWeeklyActivity(this.value)">
                        <option value="">+ Add something fun...</option>
                    </select>
                </div>

                <div id="hint" class="hint">
                    ✨ Activity added!
                </div>

                <!-- Progress -->
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="progress-text" id="progress-text">0 of 5 done!</div>
            </div>

            <!-- Clear Button -->
            <button class="clear-btn" onclick="clearDayData()">🗑️ Start Fresh</button>
        </div>
    </div>

    <script>
        // Vacation Configuration
        const VACATION_START = new Date(2026, 2, 19); // March 19, 2026
        const VACATION_END = new Date(2026, 3, 19);   // April 19, 2026

        // Generate calendar weeks (Monday to Sunday)
        function generateWeeks() {
            const weeks = [];

            // Find the Monday of the week that contains vacation start
            let firstMonday = new Date(VACATION_START);
            const dayOfWeek = firstMonday.getDay();
            // If Sunday (0), go back 6 days; otherwise go back (dayOfWeek - 1) days
            const daysToSubtract = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
            firstMonday.setDate(firstMonday.getDate() - daysToSubtract);

            let currentStart = new Date(firstMonday);
            let weekNum = 1;

            while (currentStart <= VACATION_END && weekNum <= 6) {
                const weekStart = new Date(currentStart);
                const weekEnd = new Date(currentStart);
                weekEnd.setDate(weekEnd.getDate() + 6); // Sunday

                weeks.push({
                    num: weekNum,
                    start: new Date(weekStart),
                    end: new Date(weekEnd),
                    label: `Week ${weekNum}`,
                    dateRange: `${formatShortDate(weekStart)} - ${formatShortDate(weekEnd)}`
                });

                currentStart.setDate(currentStart.getDate() + 7);
                weekNum++;
            }

            return weeks;
        }

        function formatShortDate(date) {
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            return `${months[date.getMonth()]} ${date.getDate()}`;
        }

        function formatFullDate(date) {
            const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            return {
                dayName: days[date.getDay()],
                fullDate: `${months[date.getMonth()]} ${date.getDate()}`
            };
        }

        function getDateKey(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        function isToday(date) {
            const today = new Date();
            return date.getDate() === today.getDate() &&
                   date.getMonth() === today.getMonth() &&
                   date.getFullYear() === today.getFullYear();
        }

        function isWithinVacation(date) {
            return date >= VACATION_START && date <= VACATION_END;
        }

        function getCurrentWeekIndex() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            for (let i = 0; i < weeks.length; i++) {
                const start = new Date(weeks[i].start);
                const end = new Date(weeks[i].end);
                start.setHours(0, 0, 0, 0);
                end.setHours(23, 59, 59, 999);
                if (today >= start && today <= end) {
                    return i;
                }
            }
            // If before vacation, return first week
            if (today < VACATION_START) return 0;
            // If after vacation, return last week
            return weeks.length - 1;
        }

        function getTodayDate() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            return today;
        }

        const weeks = generateWeeks();
        const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const dayNamesMonFirst = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

        // Theme configuration
        const themes = {
            unicorn: { avatar: '🦄', name: 'Unicorn' },
            flower: { avatar: '🌸', name: 'Flower' },
            ocean: { avatar: '🐬', name: 'Ocean' },
            rainbow: { avatar: '🌈', name: 'Rainbow' }
        };
        let selectedTheme = 'unicorn';

        const dailyAnchors = [
            { id: 'reading', emoji: '📖', text: 'Book Time', time: '' },
            { id: 'outdoor', emoji: '⛹️‍♀️', text: 'Get Moving', time: '' },
            { id: 'chore', emoji: '🤝', text: 'Helping Out', time: '', hasChoreSelect: true },
            { id: 'screenfree', emoji: '🌿', text: 'Unplugged Time', time: '' },
            { id: 'evening', emoji: '🌙', text: 'Wind Down', time: '' }
        ];

        const choreOptions = [
            { category: '🍽️ Kitchen', chores: [
                'Clear the table after meals',
                'Sweep the floor after meals',
                'Put away dishes from the dishwasher',
                'Restock the fridge with water/soda',
                'Set the table before meals',
                'Make breakfast',
                'Make dinner',
                'Help unpack groceries'
            ]},
            { category: '🛏️ Bedroom & Laundry', chores: [
                'Make the bed and tidy the room',
                'Bring dirty laundry to washing machine',
                'Fold and put away clean clothes'
            ]}
        ];

        const weeklyAnchors = [
            { id: 'cooking', emoji: '👩‍🍳', text: 'Cooking Adventure', desc: 'Be a chef! Make something yummy' },
            { id: 'baking', emoji: '🧁', text: 'Baking Fun', desc: 'Cookies, cakes & sweet treats!' },
            { id: 'art', emoji: '🎨', text: 'Art Time', desc: 'Let your creativity shine!' },
            { id: 'crafts', emoji: '✂️', text: 'Crafts', desc: 'Make something cool with your hands' },
            { id: 'nature', emoji: '🌳', text: 'Nature Walk', desc: 'Discover the outdoors!' },
            { id: 'pool', emoji: '🏊', text: 'Pool Time', desc: 'Splash around and have fun!' },
            { id: 'bikes', emoji: '🚴', text: 'Bike Ride', desc: 'Feel the wind in your hair!' },
            { id: 'friend', emoji: '👭', text: 'Friend Hangout', desc: 'Good times with a buddy!' },
            { id: 'game', emoji: '🎲', text: 'Family Game', desc: 'Who will win today?' },
            { id: 'movie', emoji: '🎬', text: 'Movie Time', desc: 'Popcorn ready? Let\'s watch!' },
            { id: 'music', emoji: '🎵', text: 'Music Time', desc: 'Sing, play, or jam out!' },
            { id: 'project', emoji: '🔧', text: 'My Project', desc: 'Work on your special creation' },
            { id: 'building', emoji: '🧱', text: 'Building', desc: 'Build something awesome!' },
            { id: 'science', emoji: '🔬', text: 'Science Fun', desc: 'Experiment and discover!' },
            { id: 'newplace', emoji: '🗺️', text: 'New Place', desc: 'Adventure awaits!' },
            { id: 'market', emoji: '🛒', text: 'Market Trip', desc: 'Explore and find treasures!' },
            { id: 'picnic', emoji: '🧺', text: 'Picnic', desc: 'Yummy food under the sky!' },
            { id: 'dance', emoji: '💃', text: 'Dance Party', desc: 'Turn up the music and move!' }
        ];

        // State
        let currentProfile = null;
        let currentWeek = 0;
        let currentDate = null;
        let data = { daily: {}, weekly: {}, weeklyDone: {}, selectedChores: {} };

        // Load data from localStorage
        function loadData() {
            const savedProfile = localStorage.getItem('vacationPlannerProfile');
            const savedTheme = localStorage.getItem('vacationPlannerTheme') || 'unicorn';
            const savedData = localStorage.getItem('vacationPlannerData');
            if (savedData) {
                data = JSON.parse(savedData);
                if (!data.weeklyDone) data.weeklyDone = {};
                if (!data.selectedChores) data.selectedChores = {};
            }
            return { profile: savedProfile, theme: savedTheme };
        }

        // Save data to localStorage
        function saveData() {
            localStorage.setItem('vacationPlannerData', JSON.stringify(data));
        }

        // Save profile name and theme
        function saveProfile(name, theme) {
            localStorage.setItem('vacationPlannerProfile', name);
            localStorage.setItem('vacationPlannerTheme', theme);
        }

        // Select theme on login page
        function selectTheme(theme) {
            selectedTheme = theme;
            document.querySelectorAll('.theme-option').forEach(btn => {
                btn.classList.remove('selected');
            });
            document.querySelector(`.theme-option[data-theme="${theme}"]`).classList.add('selected');
        }

        // Submit name and start
        function submitName() {
            const nameInput = document.getElementById('name-input');
            const name = nameInput.value.trim();
            if (!name) {
                nameInput.focus();
                return;
            }
            saveProfile(name, selectedTheme);
            startPlanner(name, selectedTheme);
        }

        // Start the planner with given name and theme
        function startPlanner(name, theme) {
            currentProfile = name;
            selectedTheme = theme || 'unicorn';

            document.body.className = 'theme-' + selectedTheme;

            document.getElementById('header-title').textContent = name + "'s Planner";
            document.getElementById('header-avatar').textContent = themes[selectedTheme].avatar;

            document.getElementById('main-app').style.display = 'block';
            document.getElementById('login-page').style.display = 'none';

            // Set to current week if within vacation, otherwise first week
            currentWeek = getCurrentWeekIndex();

            // Set to today if within vacation, otherwise first day of vacation
            const today = getTodayDate();
            if (isWithinVacation(today)) {
                currentDate = new Date(today);
            } else if (today < VACATION_START) {
                // Before vacation - show first day
                currentDate = new Date(VACATION_START);
            } else {
                // After vacation - show last day
                currentDate = new Date(VACATION_END);
            }

            renderWeekSelector();
            renderDaySelector();
            renderDay();
        }

        // Render week selector
        function renderWeekSelector() {
            const select = document.getElementById('week-select');
            const today = getTodayDate();

            select.innerHTML = weeks.map((week, i) => {
                const start = new Date(week.start);
                const end = new Date(week.end);
                start.setHours(0, 0, 0, 0);
                end.setHours(23, 59, 59, 999);
                const isCurrent = today >= start && today <= end;
                const currentMarker = isCurrent ? ' 📍 NOW' : '';
                return `
                    <option value="${i}" ${i === currentWeek ? 'selected' : ''}>
                        📅 ${week.label}: ${week.dateRange}${currentMarker}
                    </option>
                `;
            }).join('');
        }

        // Select a week
        function selectWeek(weekIndex) {
            currentWeek = parseInt(weekIndex);

            // Set to first valid day of the week
            const week = weeks[currentWeek];
            currentDate = new Date(week.start);
            if (currentDate < VACATION_START) currentDate = new Date(VACATION_START);

            renderWeekSelector();
            renderDaySelector();
            renderDay();
        }

        // Render day selector tabs
        function renderDaySelector() {
            const container = document.getElementById('day-selector');
            const week = weeks[currentWeek];
            const today = getTodayDate();
            let days = [];
            let d = new Date(week.start);
            for (let i = 0; i < 7; i++) {
                days.push(new Date(d));
                d.setDate(d.getDate() + 1);
            }

            container.innerHTML = days.map(date => {
                const dateKey = getDateKey(date);
                const currentDateKey = getDateKey(currentDate);
                const isActive = dateKey === currentDateKey;
                const isTodayDate = isToday(date);
                const outsideVacation = !isWithinVacation(date);

                return `
                    <button class="day-tab ${isActive ? 'active' : ''} ${isTodayDate ? 'today' : ''} ${outsideVacation ? 'outside-vacation' : ''}"
                            onclick="selectDate('${dateKey}')"
                            ${outsideVacation ? 'disabled' : ''}>
                        <span class="day-name">${dayNames[date.getDay()]}</span>
                        <span class="day-date">${date.getDate()}</span>
                    </button>
                `;
            }).join('');
        }

        // Select a date
        function selectDate(dateKey) {
            const parts = dateKey.split('-');
            currentDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
            renderDaySelector();
            renderDay();
        }

        // Get current date key
        function getCurrentDateKey() {
            return getDateKey(currentDate);
        }

        // Render current day content
        function renderDay() {
            const dateKey = getCurrentDateKey();
            const { dayName, fullDate } = formatFullDate(currentDate);

            document.getElementById('day-title').innerHTML = `
                ${dayName}
                <span class="date">${fullDate}</span>
            `;

            // Daily tasks
            const tasksContainer = document.getElementById('daily-tasks');
            const anchors = dailyAnchors;
            const dayData = data.daily[dateKey] || {};

            tasksContainer.innerHTML = anchors.map(anchor => {
                const isCompleted = dayData[anchor.id] || false;
                const selectedChore = data.selectedChores?.[dateKey] || '';

                if (anchor.hasChoreSelect) {
                    return `
                        <div class="task-item chore-task ${isCompleted ? 'completed' : ''}">
                            <div class="task-checkbox" onclick="toggleDaily('${anchor.id}')"></div>
                            <span class="task-emoji">${anchor.emoji}</span>
                            <div class="task-content">
                                <div class="task-text">${anchor.text}</div>
                                <select class="chore-select" onchange="selectChore(this.value)" onclick="event.stopPropagation()">
                                    <option value="">Pick a chore...</option>
                                    ${choreOptions.map(cat => `
                                        <optgroup label="${cat.category}">
                                            ${cat.chores.map(chore => `
                                                <option value="${chore}" ${selectedChore === chore ? 'selected' : ''}>${chore}</option>
                                            `).join('')}
                                        </optgroup>
                                    `).join('')}
                                </select>
                            </div>
                        </div>
                    `;
                }
                return `
                    <div class="task-item ${isCompleted ? 'completed' : ''}" onclick="toggleDaily('${anchor.id}')">
                        <div class="task-checkbox"></div>
                        <span class="task-emoji">${anchor.emoji}</span>
                        <div class="task-content">
                            <div class="task-text">${anchor.text}</div>
                            ${anchor.time ? `<div class="task-time">${anchor.time}</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            // Placed weekly activities
            const placedContainer = document.getElementById('placed-activities');
            const placed = data.weekly[dateKey] || [];

            if (placed.length === 0) {
                placedContainer.innerHTML = '<div class="empty-state">No special activities yet</div>';
            } else {
                const weeklyDone = data.weeklyDone[dateKey] || {};
                placedContainer.innerHTML = placed.map(anchorId => {
                    const anchor = weeklyAnchors.find(a => a.id === anchorId);
                    if (!anchor) return '';
                    const isDone = weeklyDone[anchorId] || false;
                    return `
                        <div class="task-item special-activity ${isDone ? 'completed' : ''}" onclick="toggleWeeklyDone('${anchorId}')">
                            <div class="task-checkbox"></div>
                            <span class="task-emoji">${anchor.emoji}</span>
                            <div class="task-content">
                                <div class="task-text">${anchor.text}</div>
                            </div>
                            <button class="remove-btn" onclick="event.stopPropagation(); removePlaced('${anchorId}')">×</button>
                        </div>
                    `;
                }).join('');
            }

            // Available activities dropdown
            renderActivityDropdown(placed);

            updateProgress();
        }

        // Update progress bar
        function updateProgress() {
            const dateKey = getCurrentDateKey();
            const anchors = dailyAnchors;
            const dayData = data.daily[dateKey] || {};
            const completed = anchors.filter(a => dayData[a.id]).length;
            const total = anchors.length;
            const percent = (completed / total) * 100;

            document.getElementById('progress-fill').style.width = `${percent}%`;
            document.getElementById('progress-text').textContent = `${completed} of ${total} done!`;
        }

        // Render activity dropdown
        function renderActivityDropdown(placed) {
            const select = document.getElementById('activity-select');
            const available = weeklyAnchors.filter(a => !placed.includes(a.id));

            if (available.length === 0) {
                select.innerHTML = '<option value="">All activities added!</option>';
                select.disabled = true;
            } else {
                select.disabled = false;
                select.innerHTML = '<option value="">+ Add something fun...</option>' +
                    available.map(anchor => `
                        <option value="${anchor.id}">${anchor.emoji} ${anchor.text} - ${anchor.desc}</option>
                    `).join('');
            }
        }

        // Add weekly activity to current day
        function addWeeklyActivity(anchorId) {
            if (!anchorId) return;

            const dateKey = getCurrentDateKey();
            if (!data.weekly[dateKey]) {
                data.weekly[dateKey] = [];
            }

            const placed = data.weekly[dateKey];
            if (placed.includes(anchorId)) {
                return;
            }

            placed.push(anchorId);
            saveData();

            // Reset dropdown
            document.getElementById('activity-select').value = '';

            const hint = document.getElementById('hint');
            hint.classList.add('visible');
            setTimeout(() => hint.classList.remove('visible'), 1500);

            renderDay();
        }

        // Remove placed activity
        function removePlaced(anchorId) {
            const dateKey = getCurrentDateKey();
            const placed = data.weekly[dateKey] || [];
            data.weekly[dateKey] = placed.filter(id => id !== anchorId);
            if (data.weeklyDone[dateKey]) {
                delete data.weeklyDone[dateKey][anchorId];
            }
            saveData();
            renderDay();
        }

        // Toggle daily task
        function toggleDaily(anchorId) {
            const dateKey = getCurrentDateKey();
            if (!data.daily[dateKey]) {
                data.daily[dateKey] = {};
            }
            data.daily[dateKey][anchorId] = !data.daily[dateKey][anchorId];
            saveData();
            renderDay();
        }

        // Select a chore
        function selectChore(chore) {
            const dateKey = getCurrentDateKey();
            if (!data.selectedChores) {
                data.selectedChores = {};
            }
            data.selectedChores[dateKey] = chore;
            saveData();
        }

        // Toggle weekly activity done
        function toggleWeeklyDone(anchorId) {
            const dateKey = getCurrentDateKey();
            if (!data.weeklyDone[dateKey]) {
                data.weeklyDone[dateKey] = {};
            }
            data.weeklyDone[dateKey][anchorId] = !data.weeklyDone[dateKey][anchorId];
            saveData();
            renderDay();
        }

        // Clear current day data
        function clearDayData() {
            if (confirm('Start fresh? This will clear today\'s tasks and activities.')) {
                const dateKey = getCurrentDateKey();
                data.daily[dateKey] = {};
                data.weekly[dateKey] = [];
                data.weeklyDone[dateKey] = {};
                data.selectedChores[dateKey] = '';
                saveData();
                renderDay();
            }
        }

        // Show login page again
        function showLoginPage() {
            localStorage.removeItem('vacationPlannerProfile');
            document.getElementById('login-page').style.display = 'flex';
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('name-input').value = '';
            // Keep the current theme visual
            updateThemePickerSelection(selectedTheme);
        }

        // Update theme picker selection
        function updateThemePickerSelection(theme) {
            document.querySelectorAll('#login-theme-picker .theme-option').forEach(btn => {
                btn.classList.remove('selected');
            });
            const themeBtn = document.querySelector(`#login-theme-picker .theme-option[data-theme="${theme}"]`);
            if (themeBtn) themeBtn.classList.add('selected');
        }

        // Toggle avatar picker in planner
        function toggleAvatarPicker() {
            document.getElementById('avatar-picker').classList.toggle('visible');
        }

        // Change avatar/theme from planner
        function changeAvatar(theme) {
            selectedTheme = theme;
            document.body.className = 'theme-' + theme;
            document.getElementById('header-avatar').textContent = themes[theme].avatar;
            document.getElementById('avatar-picker').classList.remove('visible');
            localStorage.setItem('vacationPlannerTheme', theme);
        }

        // Initialize
        const saved = loadData();
        if (saved.profile) {
            startPlanner(saved.profile, saved.theme);
        }
    </script>
</body>
</html>
